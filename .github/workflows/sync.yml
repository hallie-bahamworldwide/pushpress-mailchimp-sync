name: Sync PushPress to Mailchimp

on:
  schedule:
    # Every 6 hours. Edit the cron expression to change frequency.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm install

      - run: npm run sync
        env:
          PUSHPRESS_API_KEY: ${{ secrets.PUSHPRESS_API_KEY }}
          PUSHPRESS_COMPANY_ID: ${{ secrets.PUSHPRESS_COMPANY_ID }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
